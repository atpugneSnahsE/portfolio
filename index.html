<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Home page</title>
  
  <link href="./main.3f6952e4.css" rel="stylesheet">

  <style>
    body.minimal {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      overflow-x: hidden; /* Prevent horizontal scroll on mobile */
    }

    /* 1. BACKGROUND: COMBINED GRADIENT + NEURAL CANVAS */
    #neuralCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      /* Animated Gradient from your 1st version */
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 25%, #464141 50%, #5a5a5a 75%, #6e6e6e 100%);
      background-size: 400% 400%;
      animation: gradientFlow 20s ease infinite;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 2. FIXING THE NAV BAR FOR MOBILE */
    .navbar {
      z-index: 9999 !important; /* Ensure it sits above everything */
    }

    /* Ensure the hamburger button and dropdown are clickable */
    .navbar-toggle {
      z-index: 10000 !important;
      background-color: rgba(255,255,255,0.1); /* Slight visibility */
    }

    .navbar-collapse.collapse.in {
      background: rgba(0, 0, 0, 0.9); /* Dark background so mobile menu is readable */
      display: block !important;
    }

    /* 3. HERO CONTAINER (WITHOUT BUTTONS) */
    .hero-full-container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none; /* Allows clicks to pass through to canvas if needed */
      position: relative;
      z-index: 1;
    }

    /* Original Borders if they existed in your CSS */
    #site-border-left, #site-border-right, #site-border-top, #site-border-bottom {
      z-index: 5000;
    }

    /* 4. PERSISTENT "LEARN ABOUT ME" BUTTON */
.learn-about-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9000; /* Above canvas, below navbar */
  padding: 12px 20px;
  font-size: 14px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #ffffff;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(6px);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.25s ease;
}

.learn-about-btn:hover {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.6);
}

/* Mobile refinement */
@media (max-width: 768px) {
  .learn-about-btn {
    bottom: 16px;
    right: 16px;
    padding: 10px 16px;
    font-size: 12px;
  }
}
  </style>
</head>

<body class="minimal">

  <canvas id="neuralCanvas"></canvas>

  <header>
    <nav class="navbar navbar-fixed-top navbar-inverse">
      <div class="container">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#navbar-collapse">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar-collapse">
          <ul class="nav navbar-nav">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">00 : About me</a></li>
            <li><a href="./works.html">01 : Works</a></li>
            <li><a href="./research.html">10 : Research</a></li>
            <li><a href="./contact.html">11 : Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <div class="hero-full-container"></div>

  <script src="./main.70a66962.js"></script>

  <script>
    /** NEURAL BACKGROUND LOGIC **/
    const canvas = document.getElementById('neuralCanvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    const maxDistance = 150;
    const mouse = { x: null, y: null };

    window.addEventListener('mousemove', e => { 
      mouse.x = e.clientX; 
      mouse.y = e.clientY; 
    });

    // Handle touch for mobile background interaction
    window.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
    });

    class Node {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.speedY = (Math.random() - 0.5) * 0.4;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      nodes = [];
      // Fewer nodes on mobile for better performance
      const nodeCount = window.innerWidth < 768 ? 40 : 100;
      for (let i = 0; i < nodeCount; i++) nodes.push(new Node());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      nodes.forEach(node => {
        node.update();
        node.draw();
        
        nodes.forEach(target => {
          const dx = node.x - target.x;
          const dy = node.y - target.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          
          if (dist < maxDistance) {
            const mouseDist = Math.sqrt(Math.pow(node.x - mouse.x, 2) + Math.pow(node.y - mouse.y, 2));
            const opacity = (1 - dist / maxDistance) * (mouseDist < 150 ? 0.6 : 0.15);
            
            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(target.x, target.y);
            ctx.stroke();
          }
        });
      });
      requestAnimationFrame(animate);
    }

    init();
    animate();
    window.addEventListener('resize', init);
  </script>
  <a href="./about.html" class="learn-about-btn">
  Learn about me
</a>
</body>
</html>
