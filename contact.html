<script>
// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCfGN0t7_QSpH-bVL9dQO-jxlNdWolaWbg",
  authDomain: "esportfolio-bc89b.firebaseapp.com",
  projectId: "esportfolio-bc89b",
  storageBucket: "esportfolio-bc89b.firebasestorage.app",
  messagingSenderId: "930775713824",
  appId: "1:930775713824:web:07187ef44ea6c445b1d445",
  measurementId: "G-SRKLX31E1H"
};

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Form submission handler
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const formMessage = document.getElementById('formMessage');
    const email = document.getElementById('email').value;
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value;
    
    // Disable button and show loading state
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    formMessage.style.display = 'none';
    
    try {
      // Add document to Firestore
      await db.collection('contactMessages').add({
        email: email,
        subject: subject,
        message: message,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        read: false
      });
      
      // Show success message
      formMessage.style.display = 'block';
      formMessage.className = 'alert alert-success';
      formMessage.textContent = '✓ Message sent successfully! I\'ll get back to you soon.';
      
      // Reset form
      document.getElementById('contactForm').reset();
      
    } catch (error) {
      console.error('Error sending message:', error);
      
      // Show error message
      formMessage.style.display = 'block';
      formMessage.className = 'alert alert-danger';
      formMessage.textContent = '✗ Failed to send message. Please try again or email me directly.';
    } finally {
      // Re-enable button
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send';
    }
  });

  document.addEventListener("DOMContentLoaded", function (event) {
     navActivePage();
  });
</script>
